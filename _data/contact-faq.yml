- question: Can I really sit in the vault?
  answer: >-
    Yes. Four seats inside the original bank vault. First come, first served on
    most days; reservable for small events — see our <a href="/venue-rental/">Venue</a>
    page.

- question: Do you have Wi-Fi?
  answer: >-
    Fast, free, no time limit on a single coffee. Plenty of outlets.

- question: Do you take reservations?
  answer: >-
    Not for regular seating. For private events and venue rental, yes — see the
    <a href="/venue-rental/">Venue</a> page.

- question: Do you deliver?
  answer: >-
    Yes — through <a href="https://www.doordash.com/store/java-square-opelousas-649112/2125163/" target="_blank" rel="noopener">DoorDash</a>
    across Opelousas and nearby.

- question: Are you hiring?
  answer: >-
    Drop a note via the form above with "Careers" as the topic and a little
    about yourself.
