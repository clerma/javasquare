# Community programs shown at the bottom of /events/. Edit in CloudCannon.
- heading: Suspended Coffee
  body: Pay forward a cup when you order. We keep a tab and give them out quietly.

- heading: Student Hours
  body: Half-price drip for local students — ask at the bar.

- heading: Writers' Room
  body: The conference room is reserved for quiet work on select weekday mornings.

- heading: Non-profit Rate
  body: Discounted space rental for Opelousas 501(c)(3)s. Just ask.
